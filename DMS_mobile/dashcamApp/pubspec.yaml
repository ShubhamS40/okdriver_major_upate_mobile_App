name: dashcamapp
description: A Flutter app for drowsiness detection using TensorFlow Lite
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # TensorFlow Lite
  tflite_flutter: ^0.12.1
  
  # Camera
  camera: ^0.10.5+9
  
  # Face Detection (MediaPipe alternative for Flutter)
  google_mlkit_face_detection: ^0.5.0
  
  # Audio playback for alarms
  audioplayers: ^5.2.1
  
  # Image processing
  image: ^4.1.3
  
  # Path provider for file access
  path_provider: ^2.1.1
  
  # Permission handling
  permission_handler: ^11.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/models/final_drowsiness_model.tflite
    - assets/sounds/

